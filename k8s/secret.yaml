apiVersion: v1
kind: Secret
metadata:
  name: github-runner-secret
  namespace: blis
type: Opaque
stringData:
  # Use a GitHub fine-grained PAT with Administration (Read & Write) scope.
  # The runner uses this PAT to generate registration tokens via the GitHub API.
  # See k8s/README.md for PAT creation instructions.
  github_pat: "REPLACE_WITH_GITHUB_PAT"
