apiVersion: v1
kind: Secret
metadata:
  name: github-runner-secret
  namespace: github-runners
type: Opaque
stringData:
  # Use a GitHub PAT (classic) with 'repo' scope.
  # The runner image auto-generates registration tokens from this PAT on each pod start,
  # so you don't need to worry about token expiry.
  github_pat: "REPLACE_WITH_GITHUB_PAT"
