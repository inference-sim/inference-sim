  Iteration 18: Line-search seeded multivariate TPE between iter16 and iter17 basins.

  **What Changed**:
  - No code changes to evolved_model.go — same architecture as iter16/17
  - inner_loop_optimize.py: added interpolation_endpoints support in coefficient_bounds.yaml,
    multivariate TPE, line-search enqueue logic
  - New feature: 30 linearly interpolated coefficient sets between iter16 (60.19%) and
    iter17 CMA-ES (65.37%) enqueued as initial trials for TPE

  **Why This Approach**:
  Iter17 showed that both TPE warm-start (plateaued at 60.19%) and CMA-ES (converged to
  65.37%) get trapped in local minima. The 15-experiment landscape has at least two basins
  separated by 0.83 normalized L2 distance. A line search between them probes for hidden
  valleys and gives multivariate TPE a diverse 32-point initial dataset spanning both basins.

  **Optimization Settings**:
  - sampler: TPE (multivariate=True)
  - n_jobs: 15
  - n_trials: 500
  - patience: 100
  - timeout: 200
  - initial trials: 32 (30 interpolated + 2 endpoints)

