  # α₁: Per-input-token tokenization overhead (ms per token)
  # Physical range: 50-300μs per token (BPE encoding, tensor copy)
  # Iter9: 65.0μs (decreased -45% from iter8, compensating for beta explosions)
  # Iter10: Add lower bound 50μs to prevent spurious reduction
