# Iteration 20: 8-term formula with β₈·nMoELayers
#
# **Architecture change**: Added β₈·nMoELayers — per-MoE-layer overhead term
#   that captures router gating, token permutation, and EP communication costs.
#   For dense models: nMoELayers=0 → term vanishes (zero impact on dense fit).
#   For Scout: nMoELayers=24 → adds β₈×24 µs per step.
#
# **Warm-start**: iter19 best coefficients (loss 60.11%) + β₈=0.0
#   The optimizer discovers the MoE correction from scratch.

alpha_bounds:
  - [100.0, 50000.0]   # α₀: QueueingTime (µs)
  - [0.0, 10000.0]     # α₁: PostDecodeFixedOverhead (µs)
  - [0.0, 50.0]        # α₂: OutputTokenProcessingTime (µs/token)

alpha_initial:  # iter19 best (trial 1, loss 60.11%)
  - 15561.959717498621
  - 776.243476414174
  - 45.910232684500556

beta_bounds:
  - [0.1, 3.0]      # β₁: Prefill roofline correction
  - [0.3, 3.0]      # β₂: Decode roofline correction
  - [0.3, 3.0]      # β₃: Weight loading correction
  - [0.0, 2.0]      # β₄: TP communication correction
  - [0.0, 200.0]    # β₅: Per-layer overhead (µs/layer)
  - [0.0, 500.0]    # β₆: Per-request scheduling overhead (µs/request)
  - [0.0, 500.0]    # β₇: Per-step constant overhead (µs/step)
  - [0.0, 200.0]    # β₈: Per-MoE-layer overhead (µs/MoE-layer) — NEW (capped to avoid simulation timeouts)

beta_initial:  # iter19 best + β₈=0.0 (let optimizer discover MoE correction)
  - 0.20116806029373865
  - 1.6106907719437158
  - 1.363060401466404
  - 0.3960942587233032
  - 62.28932987355146
  - 2.7976795228174027
  - 169.36568163371626
  - 0.0                   # β₈: starts at 0 — optimizer finds the MoE overhead
