reasoning: |
  Iteration 20: Add β₈·nMoELayers to the evolved model — first architectural change
  since iter16 adopted the trained-roofline formula.

  **What Changed in evolved_model.go**:
  - 8-term formula: added β₈·float64(m.numMoELayers) to the step-time sum
  - Backward compatible: 7-beta callers get β₈=0 (padded automatically)
  - No other files changed; Python optimizer reads beta count dynamically

  **Why**:
  Diagnostic analysis of iter19 best coefficients showed Scout MoE experiments
  systematically under-predict by ~50% (TTFT, E2E, ITL all uniformly low). The
  model predicts roughly half of actual Scout latency. A per-MoE-layer term
  captures router gating, token permutation, and EP communication overhead that
  the 7-term formula entirely misses.

