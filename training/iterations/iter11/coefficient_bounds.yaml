  #   β₁₀ × 62,500 ≈ 6-62ms if β₁₀ = 0.1-1.0μs
  # Note: In code, Beta[10] is in SECONDS, basis function multiplies by 1e6 to get microseconds
  - [0.00000005, 0.000002]  # [0.05μs, 2.0μs] per (token²/batch_request) — expand bounds for flexibility

