  # β₇: Decode per-request overhead (seconds per request)
  # Physical range: 0.005-0.025s = 5-25ms (output processing, TP coordination)
  # Iter9: 0.0110s = 11.0ms (REVERTED -58% from iter8's 26.3ms, now within physical range ✓)
  # Iter11: Maintain tight bounds around optimal value (physically plausible)
  - [0.005, 0.025]

  # β₈: MoE routing overhead per routed token (seconds per routed token)
  # Physical range: 0.00001-0.0001s = 10-100μs (expert dispatch, load balancing, aggregation)
  # Iter9: 0.0000727s = 72.7μs (INFLATED +143% from iter8's 30.0μs, now above initial predicted 10-50μs)
  # Iter10: Exploded to 0.005005s = 5005μs = 5.0ms (compensation artifact from broken β₁₀)
  # Iter11: Expect recovery to iter9 range after β₁₀ fix reduces Scout pressure
  - [0.00001, 0.00015]  # [10μs, 150μs]

  # β₁₀: Batching inefficiency overhead (seconds per token²/batch_request)
  # Physical range: 0.0000001-0.000001s = 0.1-1.0 μs per (token²/batch_request) — CORRECTED UNITS!
  # Iter10: 0.000000945s = 0.945μs (within expected range, NOT buggy!)
  # Iter11: Expect 0.1-1.0 μs per (token²/batch_request) — produces 59ms for long-seq
