  # Physical range: 0.5-5.0ms (HTTP parsing, request validation, queue insertion)
  # Iter9: 0.35ms (unrealistically low, spurious reduction)
  # Iter11: Maintain constrained lower bound 0.5ms to prevent spurious reduction
  - [0.0005, 0.005]  # [0.5ms, 5.0ms]

  # α₁: Per-input-token tokenization overhead (seconds per token)
  # Physical range: 50-300μs per token (BPE encoding, tensor copy)
  # Iter9: 65.0μs (decreased -45% from iter8, compensating for beta explosions)
  # Iter11: Maintain constrained lower bound 50μs to prevent spurious reduction
  - [0.00005, 0.0003]  # [50μs, 300μs]

  # α₂: Per-output-token detokenization overhead (seconds per token)
  # Physical range: 40-250μs per token (output processing, streaming)
  # Iter9: 48.5μs (decreased -46% from iter8, compensating for beta explosions)
  # Iter11: Maintain constrained lower bound 40μs to prevent spurious reduction
  - [0.00004, 0.00025]  # [40μs, 250μs]

alpha_initial:
  # Warm-start from iter9 optimal values, nudge upward toward physical ranges
  # to account for expected beta coefficient reversions after β₁₀ and β₃' fixes
  - 0.0008  # α₀ = 0.8ms (2.3× iter9's 0.35ms, toward physical 1-2ms)
  - 0.00010  # α₁ = 100μs (1.5× iter9's 65μs, toward physical 100-150μs)
  - 0.00008  # α₂ = 80μs (1.6× iter9's 48.5μs, toward physical 80-120μs)

