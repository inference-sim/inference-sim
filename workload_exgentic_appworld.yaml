version: "2"
seed: 400
category: agentic-tool-use
aggregate_rate: 1.0  # Not used - lifecycle windows control timing
horizon: 550000000  # ~9 minutes (last session end + buffer)

# AppWorld agentic tool-use workload
# Derived from exgentic appworld_test_normal_10 benchmark execution
# Data source: exgentic/outputs/appworld_test_normal_10/sessions/*/agent/litellm/trace.jsonl
#
# Note: Prompt tokens are very high (~95k) due to extensive tool schemas (Venmo, Gmail, Spotify APIs)
# Sessions excluded: 17b6ecba, 399c7732 (back-to-back API calls, not representative of normal think time)
#
# Token distributions (8 normal sessions):
#   Prompt: Gaussian (mean=94k, stdev=2-5k) - includes full tool API schemas
#   Completion: Mixed distributions based on CV (coefficient of variation):
#     - Gaussian (CV<0.6): Sessions with consistent response lengths
#     - Exponential (CV>1.2): Sessions with rare long responses (tool output dumps)
#   Think time: 4.7-10s (includes tool execution + LLM reasoning)
#
# Sessions ordered chronologically by actual execution time

clients:
  # Session 1db23ac7: 7 rounds, heavy-tailed completions (CV=1.87)
  - id: "appworld-session-1"
    tenant_id: "appworld-benchmark"
    slo_class: "standard"
    rate_fraction: 0.125
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 95675
        std_dev: 3300
        min: 92435
        max: 99354
    output_distribution:
      type: exponential
      params:
        mean: 728
    prefix_length: 0
    reasoning:
      multi_turn:
        max_rounds: 9  # Observed: 7 rounds
        think_time_us: 7589671  # 7.6s
        context_growth: accumulate
    closed_loop: true
    timeout: 300000000
    lifecycle:
      windows:
        - start_us: 11460943
          end_us: 56998972

