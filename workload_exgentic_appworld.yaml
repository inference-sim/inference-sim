# AppWorld agentic tool-use workload
# Generated from exgentic appworld trace data
#
# IMPORTANT NOTES:
# - think_time_us values are INTER-REQUEST TIMES (includes tool execution + inference + think time)
# - For closed-loop replay, set think_time_us=0 and let simulator compute inference latency
# - prefix_length: Minimum prompt tokens (cacheable system prompt + task + tool schemas).
#   Real traces show cache misses, but BLIS should know the cacheable prefix size for simulation.
# - Input tokens are very high (~95k) due to extensive tool schemas (Venmo, Gmail, Spotify APIs)
# - Output distributions vary by session:
#   - Gaussian (CV<0.6): Consistent response lengths
#   - Exponential (CV>1.2): Heavy-tailed with rare long tool output dumps

