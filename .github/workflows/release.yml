name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    name: Build and push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU is required to emulate non-native architectures (e.g. arm64 on the
      # amd64 GHA runner) for the multi-platform build declared in 'platforms' below.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image lives under the repo owner namespace on GHCR.
          # Uses github.repository_owner so the reference stays correct after an org rename.
          images: ghcr.io/${{ github.repository_owner }}/blis
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Only advance 'latest' on stable releases (tags without a pre-release suffix
            # such as -rc.1, -alpha, -beta). Pre-release tags produce version/minor tags only.
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
