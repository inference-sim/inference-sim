name: Claude Code Action

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: [self-hosted]

    steps:
      - name: Resolve PR head for fork PRs
        id: pr-info
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const headRepo = pr.head.repo ? pr.head.repo.full_name : `${context.repo.owner}/${context.repo.repo}`;
            core.setOutput('pr_head_sha', pr.head.sha);
            core.setOutput('pr_head_repo', headRepo);
            core.info(`PR #${context.issue.number}: head_repo=${headRepo}, head_sha=${pr.head.sha}`);

      - uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr-info.outputs.pr_head_repo || github.repository }}
          ref: ${{ steps.pr-info.outputs.pr_head_sha || github.sha }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          claude_args: '--model aws/claude-opus-4-6 --allowed-tools Skill Agent'
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            https://github.com/obra/superpowers-marketplace.git
          plugins: |
            code-review@claude-plugins-official
            code-simplifier@claude-plugins-official
            frontend-design@claude-plugins-official
            superpowers@superpowers-marketplace

  report-status:
    needs: claude
    if: always() && github.event_name == 'issue_comment' && github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR head SHA
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('pr_head_sha', pr.head.sha);

      - name: Report commit status
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.claude.result }}';
            const stateMap = {
              success: 'success',
              failure: 'failure',
              cancelled: 'error',
              skipped: 'pending'
            };
            const state = stateMap[result] || 'error';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr-info.outputs.pr_head_sha }}',
              state: state,
              target_url: runUrl,
              description: `Claude Code: ${result}`,
              context: 'Claude Code Action (comment trigger)'
            });
