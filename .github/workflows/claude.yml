name: Claude Code Action

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Restrict to repo collaborators (OWNER, MEMBER, or COLLABORATOR association)
    # to prevent untrusted users from triggering write-access Claude Code actions
    # via public @claude mentions. Uses event-type-specific author_association fields
    # (github.event.sender.association is not a valid GitHub Actions context field;
    # the correct path is comment.author_association for comment events).
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'issues' &&
        contains(github.event.issue.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      )
    runs-on: [self-hosted]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          claude_args: '--model aws/claude-opus-4-6 --allowed-tools Skill Agent'
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            https://github.com/obra/superpowers-marketplace.git
          plugins: |
            code-review@claude-plugins-official
            code-simplifier@claude-plugins-official
            frontend-design@claude-plugins-official
            superpowers@superpowers-marketplace
